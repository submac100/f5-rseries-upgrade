---
# ============================================================
# rSeries upgrade inventory
# rseries_chassis  — F5OS platform layer (one per appliance)
# bigip_tenants    — TMOS tenant layer (both HA members)
# ============================================================
all:
  children:

    # --- F5OS platform layer ---
    rseries_chassis:
      hosts:
        rseries-chassis-01:
          ansible_host: 192.0.2.10          # rSeries F5OS management IP

    # --- TMOS tenant layer (both HA members) ---
    bigip_tenants:
      hosts:
        tenant-01-standby:
          ansible_host: 192.0.2.20
          tenant_name: tenant-01
          ha_role: standby                  # upgrade standby first
        tenant-01-active:
          ansible_host: 192.0.2.21
          tenant_name: tenant-01
          ha_role: active
