---
# Tenant (TMOS) connection — f5_modules use iControl REST, not SSH
ansible_connection: local

f5_provider:
  server:        "{{ ansible_host }}"
  server_port:   "{{ f5_server_port | default(443) }}"
  user:          "{{ f5_username }}"
  password:      "{{ f5_password }}"
  validate_certs: false
